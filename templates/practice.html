<!DOCTYPE html>
<html data-bs-theme="dark">
    <head>
        <title></title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">

         <script>
            MathJax = {
                tex: {
                    inlineMath: {'[+]': [['$', '$']]}
                },
                options: {
                    enableMenu: false, // Disables the right-click contextual menu
                    menuOptions: {
                    settings: {
                        speech: false, // Disables speech generation
                        braille: false, // Disables braille generation
                        enrich: false   // Disables semantic enrichment (which drives interactivity)
                    }
                    }
                }
            };

            let problemType = "{{ type }}"
        </script>

        <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="{{ url_for('static', filename='css/index.css') }}", rel="stylesheet">

        <audio id="correct_1" src="{{ url_for('static', filename='audio/correctSFX/1.mp3') }}"></audio>
        <audio id="correct_2" src="{{ url_for('static', filename='audio/correctSFX/2.mp3') }}"></audio>
        <audio id="correct_3" src="{{ url_for('static', filename='audio/correctSFX/3.mp3') }}"></audio>
        <audio id="incorrect_1" src="{{ url_for('static', filename='audio/incorrectSFX/1.mp3') }}"></audio>
        <audio id="incorrect_2" src="{{ url_for('static', filename='audio/incorrectSFX/2.mp3') }}"></audio>
        <audio id="incorrect_3" src="{{ url_for('static', filename='audio/incorrectSFX/3.mp3') }}"></audio>
        <audio id="incorrect_4" src="{{ url_for('static', filename='audio/incorrectSFX/4.mp3') }}"></audio>

    </head>
    <body class="d-flex justify-content-center" style="padding: auto;">
       <div class="card" style="width: 40rem; height: fit-content;">
        <div class="card-header d-flex align-items-center justify-content-between position-relative">
            <span id="cardTitle"></span>
            <div class="position-absolute start-50 top-50 translate-middle d-flex gap-3">
                <span id="correctCount" class="count" style="color: hsl(60, 71%, 35%);" title="Correct Answers">0</span>
                <span id="skipCount" class="count" style="color: #a89984;" title="Skipped Answers" >0</span>
                <span id="incorrectCount" class="count" style="color: hsl(2, 75%, 46%);" title="Incorrect Answers">0</span>
            </div>
            <a id="practiceClose" href="{{ url_for('index') }}">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-x-lg" viewBox="0 0 16 16">
                    <path d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8z"/>
                </svg>
            </a>
        </div>
            <div class="card-body">
                <p class="card-text" style="height: 3rem;">
                    <span id="directions"></span><br>
                    <span id="mathProblem" >&nbsp;</span>
                </p>
                <math-field id="mathField" virtual-keyboard-mode="auto" smart-fence></math-field>
                <div class="d-flex align-items-center justify-content-end">
                    <div class="btn-group" role="group" >
                        <button id="solution" type="button" class="btn btn-outline-primary">Reveal Solution</button>
                        <button id="submit" type="button" class="btn btn-primary" style="width: 10ch;">Submit</button>
                    </div>
                </div>
            </div>
        </div> 
        <script defer src="https://cdn.jsdelivr.net/npm/mathlive"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script type="module" src="{{ url_for('static', filename='js/practice.js' )}}"></script>
    </body>
</html>
